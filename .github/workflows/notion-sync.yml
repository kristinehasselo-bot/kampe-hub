name: Notion til hub

# Speiler Content Calendar og godkjente eiendommer fra Notion inn i huben.
# Kjører fire ganger om dagen og kan startes manuelt.
on:
  schedule:
    - cron: '0 5,11,15,19 * * *'
  workflow_dispatch:

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Synk Notion til hub
        run: node claude-tasks/notion-sync.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
